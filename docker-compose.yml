services:
  db:
    image: postgres:15-alpine
    container_name: dimash_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: superpassword123
      POSTGRES_DB: capybara_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: